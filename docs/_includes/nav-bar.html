<nav class="navbar navbar-expand-sm site-navbar" style="background-color: #ffffff; border-bottom: 1px solid #e4eaea;">
  <div class="container">
        <a class="navbar-brand navbar-brand-static" href="{{ '/' | relative_url }}" >
          <span class="text-base ps-2">
            <img src="{{ '/assets/img/uelab-logo.png' | relative_url }}" height="24">
            User Empowerment Lab
          </span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#collapsibleNavbar">
          <span class="navbar-toggler-icon"></span>
        </button>
          <div class="collapse navbar-collapse" id="collapsibleNavbar">
            <ul class="navbar-nav ms-auto pe-2">
            {% for item in site.data.nav-bar %}
                <li class="nav-item">
                    {% if item.link contains 'http' %}
                    <a href="{{ item.link }}" class="nav-link" target="_blank">
                        {{ item.name }}
                    </a>

                    {% else %}
                    <a href="{{ item.link | relative_url }}"
                       {% if page.url == item.link %} class="nav-link active" aria-current="page"
                       {% else %} class="nav-link"
                       {% endif %}>

                        {{ item.name }}
                    </a>

                    {% endif %}
                </li>  
            {% endfor %}
            </ul>
          </div>
  </div>
</nav>
