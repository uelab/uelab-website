{% assign video = include.video title = include.title description = include.description %}

<div class="card p-1 m-1" style="width: 22rem;">
    <div class="card-video youtube-embed">
        <iframe src="{{ video }}"
                title="YouTube video"
                allowfullscreen>
        </iframe>
    </div>
    <div class="card-body">
        <h5 class="card-title">{{ include.title }}</h5>
        <p class="card-small-details">{{ include.description }}</p>
    </div>
</div>
