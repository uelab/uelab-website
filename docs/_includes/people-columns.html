<div class="container-fluid mt-4 px-5">
    <h3 class="section-header">{{ include.header }}</h3>
    <div class="row row-cols-auto">
        {% for value in include.values %}
        <div class="col">
            <div style="width: 12rem;">
                <a href="{{ value.url | relative_url }}">{{ value.name }}</a>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
